# Project5 - Private Email dApp - Production Configuration
# PREREQUISITE: External ERC-4337 infrastructure (RPC, bundler, paymaster API) must be running.
# Usage (from project5 root): docker compose -f infra/docker/docker-compose.prod.yml --env-file .env.prod up -d
#
# Services: contract-deployer-project5 (one-time), frontend-project5

services:
  contract-deployer-project5:
    build:
      context: ../..
      dockerfile: services/contract-deployer/Dockerfile
    environment:
      RPC_URL: ${RPC_URL}
      DEPLOY_OUTPUT_DIR: ${DEPLOY_OUTPUT_DIR:-/deploy-output}
      MAIL_CONTRACT_ADDRESS_FILE: ${MAIL_CONTRACT_ADDRESS_FILE:-/deploy-output/mail-address}
      DEPLOYER_MNEMONIC: ${DEPLOYER_MNEMONIC}
      DEPLOYER_PRIVATE_KEY: ${DEPLOYER_PRIVATE_KEY}
    volumes:
      - deploy-output:/deploy-output
    restart: "no"
    profiles:
      - deploy  # Run with --profile deploy to redeploy only

  frontend-project5:
    build:
      context: ../..
      dockerfile: services/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3002}:3001"
    environment:
      RPC_URL: ${RPC_URL}
      BUNDLER_URL: ${BUNDLER_URL}
      PAYMASTER_API_URL: ${PAYMASTER_API_URL}
      ENTRYPOINT_ADDRESS: ${ENTRYPOINT_ADDRESS:-0x0000000071727De22E5E9d8BAf0edAc6f37da032}
      CHAIN_ID: ${CHAIN_ID:-137}
      USDC_ADDRESS: ${USDC_ADDRESS:-0x3c499c542cEF5E3811e1192ce70d8cC03d5c3359}
      ANVIL_WHALE_CANDIDATES: ""
      ENABLE_ANVIL_WHALE_FUNDING: "false"
      CONTRACTS_JSON_PATH: /deploy-output/contracts.json
    volumes:
      - deploy-output:/deploy-output
    depends_on:
      contract-deployer-project5:
        condition: service_completed_successfully
        required: false  # Allow frontend to start even if deployer hasn't run (e.g. first deploy)
    restart: unless-stopped

volumes:
  deploy-output: {}
